apiVersion: apps/v1
kind: Deployment
metadata:
  name: forecast-deployment
  namespace: dreem
  labels:
    app: forecast
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forecast
  template:
    metadata:
      labels:
        app: forecast
    spec:
      serviceAccountName: forecast-sa
      containers:
      - name: forecast
        image: harbor.crownlabs.polito.it/cloud-sandbox/s324163/dreem-k8s/forecast:0.0.6
        args: ["--start-after", "0", "--prometheus-url", "http://kind-prometheus-kube-prome-prometheus.monitoring.svc.cluster.local:9090"]  

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forecast-sa
  namespace: dreem

---
# Role per accedere a ConfigMaps e ClusterConfigurations nel namespace dreem
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forecast-role
  namespace: dreem
rules:
  # Permessi per leggere ConfigMaps
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  
  # Permessi per ClusterConfiguration CRD
  - apiGroups: ["cluster.dreemk8s"]
    resources: ["clusterconfigurations"]
    verbs: ["get", "list", "watch", "create"]
  
  # Permessi per leggere lo status di ClusterConfiguration
  - apiGroups: ["cluster.dreemk8s"]
    resources: ["clusterconfigurations/status"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forecast-rolebinding
  namespace: dreem
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: forecast-role
subjects:
  - kind: ServiceAccount
    name: forecast-sa
    namespace: dreem

---
# ClusterRole per accedere alle Machines di Cluster API, Secrets e Nodes
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: forecast-machines-reader
rules:
  # Permessi per leggere le Machines (Cluster API)
  - apiGroups: ["cluster.x-k8s.io"]
    resources: ["machines"]
    verbs: ["get", "list", "watch"]
  
  # Permessi per leggere Secrets (kubeconfig del cluster esterno)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  
  # Permessi per leggere Nodes
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: forecast-machines-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: forecast-machines-reader
subjects:
  - kind: ServiceAccount
    name: forecast-sa
    namespace: dreem
